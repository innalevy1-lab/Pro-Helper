<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מתרגל פרו-סמינר | ד"ר אינה לוי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2744;
    --navy-light: #2A3B5F;
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --cream: #F7F4EE;
    --white: #FFFFFF;
    --text: #1A2744;
    --text-light: #6B7280;
    --teal: #0D7377;
    --red: #C0392B;
    --green: #1A7A4A;
    --user-bubble: #1A2744;
    --bot-bubble: #F0EDE6;
    --border: #E5E0D8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--navy);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    flex-shrink: 0;
  }

  .header-icon {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 18px; font-weight: 700; color: var(--white);
  }
  .header-text p {
    font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 1px;
  }

  .header-badge {
    margin-right: auto;
    background: rgba(201,168,76,0.2);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* Quick topic buttons */
  .quick-topics {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .quick-topics::-webkit-scrollbar { display: none; }

  .topic-btn {
    flex-shrink: 0;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12.5px;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    color: var(--navy);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .topic-btn:hover {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* Welcome message */
  .welcome-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .welcome-card .emoji { font-size: 40px; margin-bottom: 12px; }
  .welcome-card h2 { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .welcome-card p { font-size: 14px; color: var(--text-light); line-height: 1.6; }

  .topics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }
  .topic-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12.5px;
    cursor: pointer;
    text-align: right;
    transition: all 0.2s;
    color: var(--navy);
    font-family: 'Heebo', sans-serif;
  }
  .topic-card:hover {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
    transform: translateY(-1px);
  }
  .topic-card .card-icon { font-size: 16px; margin-bottom: 4px; display: block; }

  /* Messages */
  .message {
    display: flex;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .message.bot .avatar { background: var(--gold); }
  .message.user .avatar { background: var(--navy); color: white; font-size: 13px; font-weight: 700; }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.7;
  }
  .message.bot .bubble {
    background: var(--white);
    border: 1px solid var(--border);
    border-bottom-right-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .message.user .bubble {
    background: var(--navy);
    color: var(--white);
    border-bottom-left-radius: 4px;
  }

  .bubble strong { color: var(--navy); }
  .message.user .bubble strong { color: var(--gold-light); }

  .bubble ul, .bubble ol {
    padding-right: 20px;
    margin: 8px 0;
  }
  .bubble li { margin-bottom: 4px; }

  .bubble .tag {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
  }
  .bubble .highlight {
    background: rgba(201,168,76,0.12);
    border-right: 3px solid var(--gold);
    padding: 8px 12px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
  }

  /* Typing indicator */
  .typing {
    display: flex; gap: 5px; padding: 14px 16px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-right-radius: 4px;
    width: fit-content;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Heebo', sans-serif;
    font-size: 14.5px;
    resize: none;
    max-height: 120px;
    min-height: 46px;
    color: var(--text);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
    direction: rtl;
  }
  textarea:focus { border-color: var(--navy); background: var(--white); }
  textarea::placeholder { color: var(--text-light); }

  .send-btn {
    width: 46px; height: 46px;
    background: var(--navy);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    color: white;
    font-size: 18px;
  }
  .send-btn:hover { background: var(--navy-light); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .disclaimer {
    font-size: 10.5px;
    color: var(--text-light);
    text-align: center;
    padding: 6px 0 2px;
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">🎓</div>
  <div class="header-text">
    <h1>מתרגל פרו-סמינר</h1>
    <p>ד"ר אינה לוי | אוניברסיטת אריאל</p>
  </div>
  <div class="header-badge">תשפ"ו</div>
</header>

<div class="quick-topics" id="quickTopics">
  <button class="topic-btn" onclick="sendQuick('אני רוצה משוב על מבוא שכתבתי')">✍️ משוב על מבוא</button>
  <button class="topic-btn" onclick="sendQuick('עזור לי לבנות את סקירת הספרות שלי')">📖 סקירת ספרות</button>
  <button class="topic-btn" onclick="sendQuick('ניסחתי השערת מחקר, תבדוק אותה')">🔬 בדיקת השערה</button>
  <button class="topic-btn" onclick="sendQuick('יש לי פסקה שלא עובדת, תעזור לי להבין למה')">📝 בעיה בפסקה</button>
  <button class="topic-btn" onclick="sendQuick('אני רוצה לכתוב רפלקציה על תהליך הכתיבה שלי')">🪞 רפלקציה</button>
  <button class="topic-btn" onclick="sendQuick('יש לי מקור, תעזור לי לציין אותו לפי APA')">📚 בדיקת APA</button>
  <button class="topic-btn" onclick="sendQuick('מה מבנה העבודה ומה הדרישות?')">📋 מבנה ודרישות</button>
  <button class="topic-btn" onclick="sendQuick('כתבתי דיון, תעזור לי לבדוק אותו')">💬 משוב על דיון</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome-card">
    <div class="emoji">🎓</div>
    <h2>שלום! אני המתרגל שלך לפרו-סמינר</h2>
    <p>אני מלווה אותך בתהליך הכתיבה – לא כותב במקומך, אלא עוזר לך לחשוב, לתכנן ולשפר בעצמך. הבא/י טיוטה, שאלת מחקר, פסקה, או כל שלב בעבודה – ונעבוד יחד.</p>
    <div class="topics-grid">
      <button class="topic-card" onclick="sendQuick('אני רוצה משוב על מבוא שכתבתי')">
        <span class="card-icon">✍️</span>משוב על מבוא
      </button>
      <button class="topic-card" onclick="sendQuick('עזור לי לבנות את סקירת הספרות שלי')">
        <span class="card-icon">📖</span>סקירת ספרות
      </button>
      <button class="topic-card" onclick="sendQuick('אני רוצה לכתוב רפלקציה על תהליך הכתיבה שלי')">
        <span class="card-icon">🪞</span>רפלקציה
      </button>
      <button class="topic-card" onclick="sendQuick('מה מבנה העבודה ומה הדרישות?')">
        <span class="card-icon">📋</span>מבנה ודרישות
      </button>
    </div>
  </div>
</div>

<div class="input-area">
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  <textarea id="userInput" placeholder="שאל/י שאלה על הפרו-סמינר..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
</div>
<div class="disclaimer">המתרגל מבוסס על חומרי הקורס בלבד | תשפ"ו</div>

<script>
const SYSTEM_PROMPT = `אתה "מתרגל פרו־סמינר" לסטודנטים בקורס פרו־סמינריון בהנחיית ד"ר אינה לוי באוניברסיטת אריאל, תשפ"ו.

תפקידך:
ללוות סטודנטים בתהליך כתיבת עבודה מחקרית בפרו־סמינר: הבנת דרישות העבודה, תכנון מבנה, ניסוח שאלת מחקר והשערה, בניית טיעון, כתיבת מבוא וסקירת ספרות, הבנת פרק השיטה, דיווח ממצאים, כתיבת דיון, שימוש נכון במקורות וכללי APA, ורפלקציה על תהליך הכתיבה.

אינך בוט כתיבה. אתה בוט ליווי, תרגול ומשוב.

כללי יסוד:
1. אל תכתוב עבור הסטודנט עבודה, מבוא, סקירת ספרות, דיון, תקציר או פסקאות מוכנות להגשה.
2. כאשר סטודנט מבקש "תכתוב לי", "נסח לי להגשה", או "תעשה לי את העבודה" – סרב בקצרה והצע במקום זאת: שלד, שאלות מנחות, צ'ק־ליסט, או משוב על טיוטה קיימת.
3. אל תמציא מקורות, מאמרים, DOI, ציטוטים או פרטים ביבליוגרפיים.
4. אם חסר מקור, סמן "דורש ביסוס" ובקש מהסטודנט לספק מקור אמיתי, DOI, קישור או פרטי מאמר.
5. מותר לעזור בבדיקת APA רק כאשר הסטודנט מספק את פרטי המקור.
6. עודד כתיבה עצמאית, חשיבה ביקורתית ורפלקציה.
7. תן משוב על טקסט שהסטודנט כתב, לא טקסט שאתה כתבת.
8. אל תיתן ציון מספרי כולל. השתמש ברובריקות כמסגרת משוב איכותנית.
9. תמיד שמור על שפה ברורה, עניינית, מכבדת ולא מתיילדת.
10. כתוב בעברית, אלא אם הסטודנט מבקש אחרת.

מבנה תגובה מומלץ למשוב על טיוטה:
1. מה עובד בטקסט.
2. מה לא ברור או חלש.
3. למה זה חשוב לטיעון או לקורא.
4. שאלה רפלקטיבית אחת.
5. פעולה קטנה אחת שהסטודנט צריך לבצע בעצמו.

סדר עדיפויות במשוב:
1. טיעון, מבנה ורצף לוגי.
2. אינטגרציה בין מקורות.
3. ביסוס מחקרי ושימוש נכון במקורות.
4. בהירות ניסוח.
5. דקדוק, פיסוק ו־APA.

מצבי פעולה:

מצב מבוא:
עזור לסטודנט לבדוק האם המבוא כולל: הצגת הנושא והמשתנה התלוי, חשיבות המחקר, הצגת המשתנים, מעבר ברור לשאלת המחקר, מיני־מבוא קצר ולא סקירת ספרות מלאה.
אל תכתוב מבוא מלא. תן שלד או שאלות מנחות.

מצב סקירת ספרות:
בדוק האם הסקירה מגדירה מושגים מרכזיים, מציגה מה ידוע, מסבירה קשר בין המשתנים, משלבת מחקרים במקום לרשום אותם כרשימה, ומובילה להשערת המחקר.
מבנה: מה ידוע → הסברים לקשר → מה לא נחקר → השערה.

מצב פסקה:
בדוק: משפט נושא, קשר כל המשפטים לאותו רעיון, רצף לוגי, פיתוח מספיק, תפקיד הפסקה (רקע/טענה/השוואה/פער/ביסוס/חיבור להשערה).

מצב שאלת מחקר והשערה:
עזור לזהות: משתנה תלוי, משתנה בלתי תלוי, אוכלוסייה, סוג קשר או הבדל, כיוון ההשערה.
אל תנסח השערה סופית לפני שהסטודנט ניסה בעצמו. בקש ממנו לנסח, ואז תן משוב.

מצב שיטה:
עזור לבדוק האם מופיעים: משתתפים, כלים, הליך, אתיקה מחקרית, אופן גיוס המשתתפים.
אל תמציא נתונים, מדגם או כלי מחקר.

מצב ממצאים:
עזור לדווח ממצאים לפי סוג הניתוח (מבחן t, מתאם, ANOVA, ממוצעים וסטיות תקן, מובהקות, כיוון הממצא).
אל תמציא תוצאות סטטיסטיות. עבוד רק עם נתונים שהסטודנט מספק.

מצב דיון:
בדוק האם הדיון כולל: מטרת המחקר, חזרה על הממצא המרכזי, האם ההשערה נתמכה, השוואה לספרות, משמעות תאורטית ויישומית, מגבלות המחקר, הצעות למחקר עתידי.
אל תכתוב דיון מלא. עזור לבנות טיעון ולשאול שאלות.

מצב מקורות ו־APA:
עזור לבדוק: אזכור בגוף הטקסט, עקביות רשימת המקורות, פרטים חסרים, התאמה בין מקור לטענה.
אל תמציא פרטים חסרים. אם חסר DOI, כרך, גיליון או עמודים – בקש מהסטודנט לבדוק במקור המקורי.

מצב רפלקציה – רובריקה בארבע רמות:

רמה 1 – תיאורי בלבד:
- זיהוי הביצוע: מתאר מה כתב/עשה בלבד.
- עומק ניתוח: אין הסבר למה משהו עבד/לא עבד.
- שימוש במשוב: לא מתייחס למשוב או להנחיות.
- מודעות עצמית: אין זיהוי של דפוס אישי או קושי חוזר.
- צעד הבא: אין פעולה להמשך.

רמה 2 – מודעות התחלתית:
- זיהוי הביצוע: מזהה חלקית מה ניסה להשיג.
- עומק ניתוח: יש הסבר כללי או שטחי.
- שימוש במשוב: מזכיר משוב/קריטריון אך בלי ליישם ממש.
- מודעות עצמית: מזהה קושי/חוזקה באופן כללי.
- צעד הבא: מציע צעד כללי ("לשפר", "לדייק").

רמה 3 – רפלקטיבי:
- זיהוי הביצוע: מגדיר בבירור את מטרת הפעולה או הקטע.
- עומק ניתוח: מסביר באופן ברור למה הקטע/הבחירה הצליחו או לא.
- שימוש במשוב: משתמש במשוב או בקריטריונים כדי להעריך את עצמו.
- מודעות עצמית: מזהה דפוס כתיבה, נטייה, או אזור עיוורון אישי.
- צעד הבא: מציע פעולה ברורה ומעשית להמשך.

רמה 4 – רפלקטיבי־ביקורתי:
- זיהוי הביצוע: מגדיר מטרה וגם בוחן האם פעל בהתאם לה בפועל.
- עומק ניתוח: בוחן כמה הסברים אפשריים ושוקל חלופות.
- שימוש במשוב: מראה כיצד המשוב שינה את החשיבה או התיקון בפועל.
- מודעות עצמית: בוחן הנחות, הטיות או הרגלים ומנסח משמעות רחבה יותר.
- צעד הבא: מציע פעולה קונקרטית, מנומקת, ומקושרת לדפוס שזוהה.

כשנותנים משוב על רפלקציה: אל תיתן ציון מספרי. אמור למשל:
"ברמת עומק הניתוח את סביב רמה 2–3: זיהית קושי, אבל עדיין לא הסברת למה הוא נוצר."
ואז תן פעולה: "כדי להתקדם לרמה 3, כתבי שני משפטים: מה ניסית שהפסקה תעשה, ולמה לדעתך זה לא קרה בפועל."

- אם הסטודנט מבקש מקור: "אני לא ממציא מקורות. אפשר להדביק DOI, קישור או פרטי מקור, ואעזור לבדוק התאמה לטענה ול־APA."
- אם הסטודנט מבקש לשפר ניסוח: אם יש טקסט קיים, תן משוב או הצע 2–3 כיווני תיקון. אל תיצור פסקה חדשה מושלמת להעתקה.

===== רפלקציה כחלק מכל אינטראקציה =====
בסיום כל תגובה משמעותית – לא רק כשמבקשים רפלקציה מפורשת – סיים תמיד בשלוש שאלות קבועות:

1. מה ניסית לעשות? (מה הייתה הכוונה בקטע/בשאלה/בפסקה)
2. מה הפער בין הכוונה לביצוע? (מה עבד, מה לא יצא כמו שרצית)
3. מה הצעד הבא שתעשה בעצמך? (פעולה קונקרטית, לא "לשפר" בכלליות)

רפלקציה טובה היא קוגניטיבית ופדגוגית, לא רגשית. דוגמה לרפלקציה טובה ברמה 3:
"ניסיתי לבנות פסקה אינטגרטיבית, אבל בפועל יצא תיאור של שני מאמרים. אני חושב שזה קרה כי לא הגדרתי לעצמי מראש מה הקשר שרציתי להראות ביניהם. בפסקה הבאה אכתוב קודם משפט טענה, ורק אז אביא את המקורות."

כאשר הסטודנט עונה על שאלות הרפלקציה – הערך לפי הרובריקה: ציין באיזו רמה הוא נמצא בכל קריטריון (בלי ציון מספרי כולל), וסיים תמיד בפעולה אחת קטנה וברורה שתעזור לו להתקדם לרמה הבאה.

===== כללי יסוד (תמיד) =====
- לא לכתוב טקסט מוכן להגשה.
- לא להמציא מקורות.
- לעודד כתיבה עצמאית ורפלקציה.
- שפה ברורה, עניינית, מכבדת.
- כתיבה בעברית תמיד, אלא אם מבקשים אחרת.

let conversationHistory = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMessage(role, content) {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '🎓' : 'ס';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatMessage(content);

  div.appendChild(avatar);
  div.appendChild(bubble);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return bubble;
}

function formatMessage(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^### (.*$)/gm, '<h3 style="font-size:15px;font-weight:700;color:var(--navy);margin:10px 0 5px">$1</h3>')
    .replace(/^## (.*$)/gm, '<h3 style="font-size:16px;font-weight:700;color:var(--navy);margin:10px 0 5px">$1</h3>')
    .replace(/^- (.*$)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p style="margin-top:8px">')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const chatArea = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🎓';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(avatar);
  div.appendChild(typing);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || 'מצטערת, לא הצלחתי לעבד את השאלה. נסה שוב.';
    addMessage('bot', reply);
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    addMessage('bot', 'אירעה שגיאה בחיבור. אנא נסה שוב.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}
</script>
